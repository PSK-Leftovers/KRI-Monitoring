spring:
  application:
    name: kri

  datasource:
    url: jdbc:postgresql://localhost:5432/kri
    username: kri
    password: kri
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect