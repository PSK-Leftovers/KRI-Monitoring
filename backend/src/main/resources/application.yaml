spring:
  application:
    name: kri

  output:
    ansi:
      enabled: always

  datasource:
    url: jdbc:postgresql://localhost:5432/kri
    username: kri
    password: kri
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true

  web:
    error:
      include-stacktrace: never
      include-exception: false

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate

  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME:}
    password: ${MAIL_PASSWORD:}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

logging:
  pattern:
    console: "%clr(%d{yyyy-MM-dd'T'HH:mm:ss.SSS'Z', UTC}){faint} %clr(%5p) %clr([%15.15t]){faint} %clr([%X{requestId:-no-request-id}]){yellow} %clr(%-40.40logger{39}){cyan} %clr(:){faint} %m%n%wEx"
  level:
    root: INFO
    org.flywaydb: INFO
    org.hibernate.SQL: INFO
    org.hibernate.orm.jdbc.bind: INFO

app:
  email:
    from: ${MAIL_FROM:noreply@localhost}

audit:
  enabled: true
kri:
  risk:
    calculator: threshold # threshold | advanced
