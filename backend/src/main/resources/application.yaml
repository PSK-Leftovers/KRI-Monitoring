server:
  error:
    include-stacktrace: never
    include-exception: false

spring:
  application:
    name: kri

  output:
    ansi:
      enabled: always

  datasource:
    url: jdbc:postgresql://localhost:5432/kri
    username: kri
    password: kri
    driver-class-name: org.postgresql.Driver

  flyway:
    enabled: true
    locations: classpath:db/migration

logging:
  level:
    org.flywaydb: DEBUG

  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate
    show-sql: true